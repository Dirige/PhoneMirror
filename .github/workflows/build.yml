name: Build Android APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Server APK
      id: build-server
      run: |
        set +e
        ./gradlew :server:assembleDebug --no-daemon --stacktrace > server-build.log 2>&1
        SERVER_EXIT=$?
        echo "exitcode=$SERVER_EXIT" >> $GITHUB_OUTPUT
        if [ $SERVER_EXIT -ne 0 ]; then
          echo "SERVER_LOG<<EOF" >> $GITHUB_ENV
          cat server-build.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          exit 1
        fi

    - name: Create issue on server build failure
      if: failure() && steps.build-server.outcome == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const log = process.env.SERVER_LOG || 'No log available';
          const lines = log.split('\n');
          // Extract actual Kotlin error lines (start with 'e:') and FAILURE section
          const errorLines = lines.filter(l => /^e: file:/.test(l) || /^FAILURE:/.test(l) || /^>/.test(l) || /^\* What went wrong:/.test(l) || /^> Task/.test(l));
          const logTail = lines.slice(-80).join('\n');
          const errors = errorLines.join('\n') || 'No specific error lines found';
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Build failed: ${context.sha.substring(0, 7)}`,
            body: `## Server Build Failure\n\nCommit: ${context.sha}\nRun: ${context.runId}\n\n### Error lines:\n\`\`\`\n${errors}\n\`\`\`\n\n### Last 80 lines of build log:\n\`\`\`\n${logTail}\n\`\`\`\n`,
            labels: ['build-failure']
          });

    - name: Build Client APK
      run: ./gradlew :client:assembleDebug --no-daemon --stacktrace

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        body: |
          Automated build from commit ${{ github.sha }}
          
          ## Changes
          ${{ github.event.head_commit.message }}
        draft: false
        prerelease: false
        files: |
          server/build/outputs/apk/debug/*.apk
          client/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APKs to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        draft: false
        prerelease: false
        files: |
          server/build/outputs/apk/debug/*.apk
          client/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}