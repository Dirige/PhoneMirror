name: Build Android APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Server APK
      id: build-server
      run: |
        set +e
        ./gradlew :server:assembleDebug --no-daemon --stacktrace > server-build.log 2>&1
        SERVER_EXIT=$?
        echo "exitcode=$SERVER_EXIT" >> $GITHUB_OUTPUT
        if [ $SERVER_EXIT -ne 0 ]; then
          echo "SERVER_LOG<<EOF" >> $GITHUB_ENV
          cat server-build.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          exit 1
        fi

    - name: Create issue on server build failure
      if: failure() && steps.build-server.outcome == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const log = process.env.SERVER_LOG || 'No log available';
          const logTail = log.split('\n').slice(-50).join('\n');
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Build failed: ${context.sha.substring(0, 7)}`,
            body: `## Server Build Failure\n\nCommit: ${context.sha}\nRun: ${context.runId}\n\n### Last 50 lines of build log:\n\`\`\`\n${logTail}\n\`\`\`\n`,
            labels: ['build-failure']
          });

    - name: Build Client APK
      run: ./gradlew :client:assembleDebug --no-daemon --stacktrace

    - name: Upload Server APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneMirror-Server
        path: server/build/outputs/apk/debug/*.apk

    - name: Upload Client APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneMirror-Client
        path: client/build/outputs/apk/debug/*.apk
