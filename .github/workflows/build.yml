name: Build Android APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Server APK
      run: ./gradlew :server:assembleDebug --no-daemon --stacktrace

    - name: Build Client APK
      run: ./gradlew :client:assembleDebug --no-daemon --stacktrace

    - name: Upload Server APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneMirror-Server
        path: server/build/outputs/apk/debug/*.apk

    - name: Upload Client APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneMirror-Client
        path: client/build/outputs/apk/debug/*.apk
